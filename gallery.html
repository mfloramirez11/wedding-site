<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photo Albums · Manny &amp; Celesti</title>
  <meta name="description" content="Photos from our engagement, wedding, and baby showers.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: #faf7f4;
      color: #2d2420;
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; }

    /* ─── Header ────────────────────────────────────────────── */
    .page-header {
      padding: 100px 24px 64px;
      text-align: center;
    }

    .back-link {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(45,36,32,0.4);
      text-decoration: none;
      margin-bottom: 36px;
    }

    .back-link:hover { color: rgba(45,36,32,0.7); }

    .page-eyebrow {
      font-size: 10px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: rgba(45,36,32,0.4);
      margin-bottom: 24px;
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(48px, 9vw, 88px);
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    /* ─── Event nav ─────────────────────────────────────────── */
    .event-nav-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(250,247,244,0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(45,36,32,0.08);
    }

    .event-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px 28px;
      padding: 18px 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .event-nav a {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: rgba(45,36,32,0.45);
      padding-bottom: 6px;
      border-bottom: 1px solid transparent;
      transition: color 0.3s, border-color 0.3s;
      white-space: nowrap;
    }

    .event-nav a:hover {
      color: #2d2420;
      border-bottom-color: rgba(45,36,32,0.3);
    }

    .event-nav a.active {
      color: #2d2420;
      border-bottom-color: rgba(45,36,32,0.55);
    }

    /* ─── Event section ─────────────────────────────────────── */
    .event-section {
      padding: 0 20px 100px;
      max-width: 1280px;
      margin: 0 auto;
    }

    .event-heading {
      text-align: center;
      margin-bottom: 40px;
    }

    .event-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(28px, 4.5vw, 44px);
      font-weight: 300;
      margin-bottom: 10px;
    }

    .event-meta {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: rgba(45,36,32,0.45);
    }

    .event-meta a {
      text-decoration: none;
      border-bottom: 1px solid rgba(45,36,32,0.25);
    }

    .event-meta a:hover { color: #2d2420; }

    .photo-masonry {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
    }

    .photo-thumb {
      cursor: pointer;
      overflow: hidden;
      border-radius: 2px;
      background: #e8e0d8;
      aspect-ratio: 1 / 1;
    }

    .photo-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease, opacity 0.4s ease;
      opacity: 0;
    }

    .photo-thumb img.loaded { opacity: 1; }
    .photo-thumb:hover img { transform: scale(1.05); }

    .event-loading {
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: rgba(45,36,32,0.4);
      padding: 40px 0;
    }

    /* ─── Lightbox ──────────────────────────────────────────── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(10,8,6,0.94);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 40px 20px;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .lightbox-close,
    .lightbox-prev,
    .lightbox-next {
      position: absolute;
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      font-family: 'Lato', sans-serif;
      cursor: pointer;
      font-size: 14px;
      letter-spacing: 0.1em;
      transition: color 0.2s;
    }

    .lightbox-close:hover,
    .lightbox-prev:hover,
    .lightbox-next:hover { color: #fff; }

    .lightbox-close {
      top: 24px;
      right: 28px;
      font-size: 28px;
      font-weight: 300;
    }

    .lightbox-prev, .lightbox-next {
      top: 50%;
      transform: translateY(-50%);
      font-size: 32px;
      padding: 16px;
    }

    .lightbox-prev { left: 6px; }
    .lightbox-next { right: 6px; }

    .lightbox-counter {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.4);
    }

    .lightbox-events {
      position: absolute;
      bottom: 54px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px 20px;
      max-width: 90vw;
      padding: 0 12px;
    }

    .lightbox-events button {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Lato', sans-serif;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      padding-bottom: 4px;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .lightbox-events button:hover { color: rgba(255,255,255,0.8); }

    .lightbox-events button.active {
      color: #fff;
      border-bottom-color: rgba(255,255,255,0.55);
    }

    @media (max-width: 480px) {
      .page-header { padding: 72px 20px 48px; }
      .event-nav { flex-wrap: nowrap; justify-content: flex-start; overflow-x: auto; padding: 14px 16px; -webkit-overflow-scrolling: touch; }
      .event-nav::-webkit-scrollbar { display: none; }
      .event-section { padding: 0 12px 72px; }
      .photo-masonry { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 5px; }
      .lightbox-prev, .lightbox-next { font-size: 24px; padding: 10px; }
      .lightbox-events { bottom: 60px; gap: 6px 14px; }
      .lightbox-counter { bottom: 22px; }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <a class="back-link" href="/">&larr; Back home</a>
    <p class="page-eyebrow">Manny &amp; Celesti</p>
    <h1 class="page-title">Photo Albums</h1>
  </header>

  <div class="event-nav-wrap">
    <nav class="event-nav" id="eventNav"></nav>
  </div>

  <main id="eventSections"></main>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lbClose" aria-label="Close">&times;</button>
    <button class="lightbox-prev" id="lbPrev" aria-label="Previous">&#8249;</button>
    <img id="lbImage" src="" alt="">
    <button class="lightbox-next" id="lbNext" aria-label="Next">&#8250;</button>
    <div class="lightbox-events" id="lbEvents"></div>
    <div class="lightbox-counter" id="lbCounter"></div>
  </div>

  <script>
    let manifest = [];
    let activePhotos = [];
    let activeIndex = 0;
    let activeEventSlug = null;

    const eventNav = document.getElementById('eventNav');
    const eventSections = document.getElementById('eventSections');
    const lightbox = document.getElementById('lightbox');
    const lbImage = document.getElementById('lbImage');
    const lbCounter = document.getElementById('lbCounter');
    const lbEvents = document.getElementById('lbEvents');

    function creditLink(handle) {
      const username = handle.replace('@', '');
      return `<a href="https://www.instagram.com/${username}" target="_blank" rel="noopener">${handle}</a>`;
    }

    function renderEvent(event) {
      const section = document.createElement('section');
      section.className = 'event-section';
      section.id = event.slug;

      const metaParts = [event.date];
      if (event.credit) metaParts.push(`Photos by ${creditLink(event.credit)}`);

      section.innerHTML = `
        <div class="event-heading">
          <h2 class="event-title">${event.title}</h2>
          <p class="event-meta">${metaParts.join(' &nbsp;&middot;&nbsp; ')}</p>
        </div>
        <div class="photo-masonry"></div>
      `;
      eventSections.appendChild(section);

      const masonry = section.querySelector('.photo-masonry');
      event.photos.forEach((photo, i) => {
        const thumb = document.createElement('div');
        thumb.className = 'photo-thumb';
        const img = document.createElement('img');
        img.loading = 'lazy';
        img.src = photo.thumb;
        img.alt = `${event.title} photo ${i + 1}`;
        img.addEventListener('load', () => img.classList.add('loaded'));
        thumb.appendChild(img);
        thumb.addEventListener('click', () => openLightbox(event.photos, i, event.slug));
        masonry.appendChild(thumb);
      });
    }

    function openLightbox(photos, index, eventSlug) {
      activePhotos = photos;
      activeIndex = index;
      activeEventSlug = eventSlug;
      showLightboxImage();
      updateEventSwitcher();
      lightbox.classList.add('open');
    }

    function updateEventSwitcher() {
      lbEvents.querySelectorAll('button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.slug === activeEventSlug);
      });
    }

    function showLightboxImage() {
      const photo = activePhotos[activeIndex];
      lbImage.src = photo.full;
      lbCounter.textContent = `${activeIndex + 1} / ${activePhotos.length}`;
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      lbImage.src = '';
    }

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', () => {
      activeIndex = (activeIndex - 1 + activePhotos.length) % activePhotos.length;
      showLightboxImage();
    });
    document.getElementById('lbNext').addEventListener('click', () => {
      activeIndex = (activeIndex + 1) % activePhotos.length;
      showLightboxImage();
    });
    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') document.getElementById('lbPrev').click();
      if (e.key === 'ArrowRight') document.getElementById('lbNext').click();
    });

    fetch('/gallery-manifest.json')
      .then(res => res.json())
      .then(data => {
        manifest = data;
        manifest.forEach(event => {
          const link = document.createElement('a');
          link.href = `#${event.slug}`;
          link.textContent = event.title;
          link.dataset.slug = event.slug;
          eventNav.appendChild(link);
          renderEvent(event);

          const switchBtn = document.createElement('button');
          switchBtn.textContent = event.title;
          switchBtn.dataset.slug = event.slug;
          switchBtn.addEventListener('click', () => {
            if (event.slug !== activeEventSlug) openLightbox(event.photos, 0, event.slug);
          });
          lbEvents.appendChild(switchBtn);
        });

        if (location.hash) {
          const target = document.querySelector(location.hash);
          if (target) target.scrollIntoView();
        }

        const navLinks = eventNav.querySelectorAll('a');
        const sectionObserver = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (!entry.isIntersecting) return;
            navLinks.forEach(link => {
              link.classList.toggle('active', link.dataset.slug === entry.target.id);
            });
          });
        }, { rootMargin: '-40% 0px -55% 0px' });
        document.querySelectorAll('.event-section').forEach(section => sectionObserver.observe(section));
      })
      .catch(() => {
        eventSections.innerHTML = '<p class="event-loading">Photos coming soon.</p>';
      });
  </script>

</body>
</html>
