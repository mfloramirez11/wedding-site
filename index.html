<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manny & Celesti</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=Lato:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #2d3e3a 0%, #455951 100%);
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(61, 79, 71, 0.95);
            backdrop-filter: blur(10px);
            padding: 22px 0;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.3s forwards;
        }

        .nav-brand {
            text-align: center;
        }

        .nav-brand a {
            color: #c4d1c7;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .nav-brand a:hover {
            color: #ffffff;
        }

        /* Photo scrollers */
        .photo-scroller {
            position: fixed;
            top: 80px;
            width: 18%;
            min-width: 100px;
            max-width: 220px;
            height: calc(100vh - 100px);
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 1.5s forwards;
            z-index: 1;
        }

        .photo-scroller.left { left: 0; }
        .photo-scroller.right { right: 0; }

        .photo-track {
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: scrollPhotos 60s linear infinite;
        }

        .photo-scroller.right .photo-track {
            animation: scrollPhotosReverse 60s linear infinite;
        }

        @keyframes scrollPhotos {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        @keyframes scrollPhotosReverse {
            0% { transform: translateY(-50%); }
            100% { transform: translateY(0); }
        }

        .photo-item {
            width: 100%;
            height: 35vh;
            min-height: 180px;
            max-height: 400px;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: 50% 20%;
            display: block;
        }

        @media (max-width: 900px) {
            .photo-scroller { width: 16%; min-width: 90px; max-width: 180px; }
        }

        /* Main container */
        .main-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 120px calc(19% + 12px) 80px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeSlideIn 1s ease-out 0.6s forwards;
        }

        .header-script {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 300;
            font-size: 1.3rem;
            color: rgba(196, 209, 199, 0.8);
            letter-spacing: 0.5px;
            margin-bottom: 18px;
        }

        .header-names {
            font-family: 'Cinzel', serif;
            font-size: 2.6rem;
            font-weight: 400;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #c4d1c7;
            margin-bottom: 14px;
        }

        .header-divider {
            width: 60px;
            height: 1px;
            background: rgba(196, 209, 199, 0.4);
            margin: 0 auto;
        }

        /* Directory label */
        .directory-label {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(196, 209, 199, 0.55);
            text-align: center;
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeIn 1s ease-out 1s forwards;
        }

        /* Directory grid */
        .directory {
            display: flex;
            flex-direction: row;
            gap: 20px;
            justify-content: center;
            align-items: stretch;
            flex-wrap: nowrap;
            width: 100%;
            opacity: 0;
            animation: fadeSlideIn 1s ease-out 0.9s forwards;
        }

        /* Event card */
        .event-card {
            background: #3d4f47;
            border: 1px solid rgba(196, 209, 199, 0.15);
            border-radius: 4px;
            padding: 36px 20px 32px;
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .event-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(196, 209, 199, 0.3);
        }

        .event-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .card-icon {
            width: 44px;
            height: 44px;
            margin-bottom: 22px;
            opacity: 0.7;
        }

        .card-title {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #c4d1c7;
            margin-bottom: 10px;
            font-weight: 400;
        }

        .card-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1rem;
            color: rgba(196, 209, 199, 0.65);
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .card-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin-top: auto;
        }

        .card-btn {
            display: block;
            padding: 13px 12px;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 0.68rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-radius: 3px;
            transition: all 0.3s ease;
            color: #3d4f47;
            background: #c4d1c7;
            border: none;
            white-space: nowrap;
            cursor: pointer;
        }

        .card-btn:hover {
            background: #d4e1d7;
            transform: translateY(-1px);
        }

        .card-btn.secondary {
            background: transparent;
            color: #c4d1c7;
            border: 1px solid rgba(196, 209, 199, 0.4);
        }

        .card-btn.secondary:hover {
            background: rgba(196, 209, 199, 0.1);
            border-color: rgba(196, 209, 199, 0.7);
        }

        /* Botanical divider between cards */
        .card-divider {
            display: flex;
            align-items: center;
            color: rgba(196, 209, 199, 0.25);
            font-size: 1.4rem;
            align-self: center;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .main-container { padding: 120px calc(13% + 16px) 80px; }
            .card-divider { display: none; }
        }

        /* Mobile: single column, wider photos, thinner cards */
        @media (max-width: 700px) {
            .photo-scroller { width: 100px; min-width: 100px; max-width: 100px; }
            .main-container {
                padding: 100px calc(100px + 12px) 60px;
                justify-content: flex-start;
            }
            .directory {
                flex-direction: column;
                align-items: stretch;
                gap: 14px;
                width: 100%;
            }
            .event-card {
                width: 100%;
                flex: none;
                padding: 24px 16px 20px;
            }
            .card-icon { width: 32px; height: 32px; margin-bottom: 12px; }
            .card-title { font-size: 0.85rem; letter-spacing: 2px; }
            .card-subtitle { font-size: 0.9rem; margin-bottom: 16px; }
            .card-divider { display: none; }
        }

        @media (max-width: 480px) {
            .header {
                margin-bottom: 50px;
            }
            .event-card {
                width: 100%;
            }
        }
    </style>
