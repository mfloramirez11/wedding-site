<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seating Chart - Manny & Celesti</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=Lato:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(160deg, #243530 0%, #2d3e3a 45%, #3a4f47 100%);
            font-family: 'Cormorant Garamond', serif;
            color: #c4d1c7;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(61, 79, 71, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 0;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 50px;
            padding: 0;
            flex-wrap: wrap;
        }

        nav a {
            color: #c4d1c7;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s ease;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: #c4d1c7;
            transition: width 0.3s ease;
        }

        nav a:hover { color: #ffffff; }
        nav a:hover::after { width: 100%; }

        .page-wrapper {
            padding: 120px 32px 100px;
            max-width: 1140px;
            margin: 0 auto;
        }

        /* Header */
        .page-header {
            text-align: center;
            margin-bottom: 56px;
        }

        .page-title {
            font-family: 'Cinzel', serif;
            font-size: 2.4rem;
            color: #e8b4a0;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .header-ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .header-ornament::before,
        .header-ornament::after {
            content: '';
            height: 1px;
            width: 80px;
            background: linear-gradient(to right, transparent, rgba(232, 180, 160, 0.5));
        }

        .header-ornament::after {
            background: linear-gradient(to left, transparent, rgba(232, 180, 160, 0.5));
        }

        .ornament-diamond {
            width: 6px;
            height: 6px;
            background: #e8b4a0;
            transform: rotate(45deg);
            opacity: 0.7;
        }

        .page-subtitle {
            font-style: italic;
            color: rgba(196, 209, 199, 0.6);
            font-size: 1.15rem;
        }

        /* Search */
        .search-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 52px;
            position: relative;
        }

        .search-wrap svg {
            position: absolute;
            left: calc(50% - 168px);
            top: 50%;
            transform: translateY(-50%);
            color: rgba(196, 209, 199, 0.4);
            pointer-events: none;
        }

        #search {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(196, 209, 199, 0.2);
            border-radius: 40px;
            color: #c4d1c7;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            padding: 13px 24px 13px 46px;
            width: 100%;
            max-width: 380px;
            outline: none;
            transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
            letter-spacing: 0.5px;
        }

        #search::placeholder { color: rgba(196,209,199,0.35); }

        #search:focus {
            border-color: rgba(232, 180, 160, 0.5);
            background: rgba(255,255,255,0.07);
            box-shadow: 0 0 0 3px rgba(232, 180, 160, 0.08);
        }

        /* Autocomplete suggestions */
        .suggestions-wrap {
            position: absolute;
            top: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 380px;
            background: rgba(45, 60, 54, 0.98);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(196, 209, 199, 0.18);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0,0,0,0.35);
            z-index: 100;
            display: none;
        }

        .suggestions-wrap.open { display: block; }

        .suggestion-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 18px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid rgba(196, 209, 199, 0.07);
        }

        .suggestion-item:last-child { border-bottom: none; }

        .suggestion-item:hover,
        .suggestion-item.active {
            background: rgba(232, 180, 160, 0.1);
        }

        .suggestion-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            color: #c4d1c7;
        }

        .suggestion-name em {
            font-style: normal;
            color: #e8b4a0;
        }

        .suggestion-table {
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(196, 209, 199, 0.4);
        }

        .search-hint {
            text-align: center;
            font-style: italic;
            font-size: 0.95rem;
            color: rgba(196, 209, 199, 0.4);
            margin-top: -36px;
            margin-bottom: 52px;
        }

        /* Grid */
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        /* Table card */
        .table-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(196, 209, 199, 0.12);
            border-radius: 2px;
            padding: 0;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s, opacity 0.3s;
            box-shadow: 0 4px 24px rgba(0,0,0,0.15);
        }

        .table-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        }

        .table-card.highlighted {
            border-color: rgba(232, 180, 160, 0.5);
            box-shadow: 0 0 0 1px rgba(232, 180, 160, 0.2), 0 8px 32px rgba(232, 180, 160, 0.1);
        }

        .table-card.dimmed {
            opacity: 0.22;
            transform: none;
        }

        /* Card top accent bar */
        .card-accent {
            height: 3px;
            background: linear-gradient(90deg, rgba(232,180,160,0.15), rgba(232,180,160,0.6), rgba(232,180,160,0.15));
        }

        .table-card.highlighted .card-accent {
            background: linear-gradient(90deg, rgba(232,180,160,0.3), #e8b4a0, rgba(232,180,160,0.3));
        }

        .card-body {
            padding: 28px 26px 30px;
        }

        /* Table header */
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(196, 209, 199, 0.1);
        }

        .table-name {
            font-family: 'Cinzel', serif;
            font-size: 0.78rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #e8b4a0;
        }

        .table-label {
            font-style: italic;
            font-size: 0.95rem;
            color: rgba(196, 209, 199, 0.45);
        }

        /* Guest list */
        .guest-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .guest-list li {
            font-size: 1.05rem;
            color: rgba(196, 209, 199, 0.82);
            padding: 7px 0 7px 16px;
            border-bottom: 1px solid rgba(196, 209, 199, 0.06);
            transition: color 0.2s, padding-left 0.2s;
            position: relative;
            letter-spacing: 0.3px;
        }

        .guest-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: rgba(232, 180, 160, 0.35);
            transition: background 0.2s;
        }

        .guest-list li:last-child { border-bottom: none; }

        .guest-list li.match {
            color: #fff;
            padding-left: 20px;
        }

        .guest-list li.match::before {
            background: #e8b4a0;
            width: 5px;
            height: 5px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .table-card {
            animation: fadeUp 0.5s ease both;
        }

        @media (max-width: 700px) {
            nav ul { gap: 20px; }
            .page-title { font-size: 1.7rem; letter-spacing: 4px; }
            .tables-grid { grid-template-columns: 1fr 1fr; gap: 16px; }
            .card-body { padding: 20px 18px 22px; }
        }

        @media (max-width: 420px) {
            .tables-grid { grid-template-columns: 1fr; }
            .page-wrapper { padding: 110px 16px 80px; }
        }
    </style>
</head>
<body>

<nav role="navigation" aria-label="Main navigation">
    <ul>
        <li><a href="/index.html">Home</a></li>
        <li><a href="/index.html#schedule">Schedule</a></li>
        <li><a href="/seating.html">Seating</a></li>
        <li><a href="/contact.html">Contact</a></li>
    </ul>
</nav>

<div class="page-wrapper">
    <div class="page-header">
        <h1 class="page-title">Seating Chart</h1>
        <div class="header-ornament"><div class="ornament-diamond"></div></div>
        <p class="page-subtitle">Find your name and table below</p>
    </div>

    <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="search" placeholder="Search your name..." autocomplete="off" />
        <div class="suggestions-wrap" id="suggestions"></div>
    </div>
    <p class="search-hint">Can't find your name? Ask Manny or Celesti and they'll point you to your seat.</p>

    <div class="tables-grid" id="tables-grid">
        <div style="grid-column:1/-1;text-align:center;color:rgba(196,209,199,0.5);padding:40px 0;">Loading seating chart...</div>
    </div>
</div>

<script>
    const searchInput = document.getElementById('search');
    const suggestionsEl = document.getElementById('suggestions');
    const grid = document.getElementById('tables-grid');

    // Flat list of { name, tableNumber } for autocomplete
    let allGuests = [];
    let activeIndex = -1;

    function escHtml(str) {
        const d = document.createElement('div');
        d.textContent = str || '';
        return d.innerHTML;
    }

    // Highlight matched portion of a name
    function highlightMatch(name, query) {
        if (!query) return escHtml(name);
        const idx = name.toLowerCase().indexOf(query.toLowerCase());
        if (idx === -1) return escHtml(name);
        return escHtml(name.slice(0, idx))
             + `<em>${escHtml(name.slice(idx, idx + query.length))}</em>`
             + escHtml(name.slice(idx + query.length));
    }

    function renderTables(tables) {
        grid.innerHTML = '';
        allGuests = [];

        if (!tables || tables.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:rgba(196,209,199,0.5);padding:40px 0;">Seating chart coming soon.</div>';
            return;
        }

        tables.forEach((table, i) => {
            const card = document.createElement('div');
            card.className = 'table-card';
            card.dataset.table = table.table_number;
            card.style.animationDelay = `${i * 60}ms`;

            const guestItems = table.seats.map(s => {
                allGuests.push({ name: s.seat_name, tableNumber: table.table_number });
                return `<li>${escHtml(s.seat_name)}</li>`;
            }).join('');

            card.innerHTML = `
                <div class="card-accent"></div>
                <div class="card-body">
                    <div class="card-header">
                        <div class="table-name">Table ${table.table_number}</div>
                        ${table.table_label ? `<div class="table-label">${escHtml(table.table_label)}</div>` : ''}
                    </div>
                    <ul class="guest-list">${guestItems}</ul>
                </div>
            `;

            grid.appendChild(card);
        });

        applySearch();
    }

    function applySearch() {
        const query = searchInput.value.trim().toLowerCase();
        const cards = grid.querySelectorAll('.table-card');

        cards.forEach(card => {
            const items = card.querySelectorAll('.guest-list li');
            let hasMatch = false;

            items.forEach(li => {
                const name = li.textContent.toLowerCase();
                if (query && name.includes(query)) {
                    li.classList.add('match');
                    hasMatch = true;
                } else {
                    li.classList.remove('match');
                }
            });

            if (!query) {
                card.classList.remove('highlighted', 'dimmed');
            } else if (hasMatch) {
                card.classList.add('highlighted');
                card.classList.remove('dimmed');
            } else {
                card.classList.add('dimmed');
                card.classList.remove('highlighted');
            }
        });
    }

    function showSuggestions(query) {
        if (!query || query.length < 1) {
            hideSuggestions();
            return;
        }

        const matches = allGuests.filter(g =>
            g.name.toLowerCase().includes(query.toLowerCase())
        ).slice(0, 6);

        if (matches.length === 0) {
            hideSuggestions();
            return;
        }

        activeIndex = -1;
        suggestionsEl.innerHTML = matches.map((g, i) => `
            <div class="suggestion-item" data-index="${i}" data-name="${escHtml(g.name)}" data-table="${g.tableNumber}">
                <span class="suggestion-name">${highlightMatch(g.name, query)}</span>
                <span class="suggestion-table">Table ${g.tableNumber}</span>
            </div>
        `).join('');

        suggestionsEl.classList.add('open');

        suggestionsEl.querySelectorAll('.suggestion-item').forEach(item => {
            item.addEventListener('mousedown', e => {
                e.preventDefault(); // prevent input blur before click fires
                selectSuggestion(item.dataset.name, parseInt(item.dataset.table));
            });
        });
    }

    function hideSuggestions() {
        suggestionsEl.classList.remove('open');
        suggestionsEl.innerHTML = '';
        activeIndex = -1;
    }

    function selectSuggestion(name, tableNumber) {
        searchInput.value = name;
        hideSuggestions();
        applySearch();

        // Scroll to the matching table card
        const card = grid.querySelector(`.table-card[data-table="${tableNumber}"]`);
        if (card) {
            setTimeout(() => {
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 80);
        }
    }

    // Keyboard navigation
    searchInput.addEventListener('keydown', e => {
        const items = suggestionsEl.querySelectorAll('.suggestion-item');
        if (!items.length) return;

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            activeIndex = Math.min(activeIndex + 1, items.length - 1);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            activeIndex = Math.max(activeIndex - 1, -1);
        } else if (e.key === 'Enter' && activeIndex >= 0) {
            e.preventDefault();
            const active = items[activeIndex];
            selectSuggestion(active.dataset.name, parseInt(active.dataset.table));
            return;
        } else if (e.key === 'Escape') {
            hideSuggestions();
            return;
        }

        items.forEach((el, i) => el.classList.toggle('active', i === activeIndex));
    });

    searchInput.addEventListener('input', () => {
        applySearch();
        showSuggestions(searchInput.value.trim());
    });

    searchInput.addEventListener('blur', () => {
        // Small delay so mousedown on suggestion fires first
        setTimeout(hideSuggestions, 150);
    });

    searchInput.addEventListener('focus', () => {
        if (searchInput.value.trim()) showSuggestions(searchInput.value.trim());
    });

    // Load from API
    async function loadSeating() {
        try {
            const res = await fetch('/api/get-seating');
            if (!res.ok) throw new Error('API error');
            const data = await res.json();
            renderTables(data.tables);
        } catch (err) {
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:rgba(196,209,199,0.5);padding:40px 0;">Unable to load seating chart. Please try again later.</div>';
        }
    }

    loadSeating();
</script>

</body>
</html>
